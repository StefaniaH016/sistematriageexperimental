server {
    listen 80;
    server_name _;

    # Directorio raíz donde están los archivos compilados de Angular
    root /usr/share/nginx/html;
    index index.html;

    # Habilitar compresión gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # ─────────────────────────────────────────────────────────
    # PROXY INVERSO AL BACKEND
    # Todas las peticiones a /api/* se redirigen al backend Spring Boot
    # ─────────────────────────────────────────────────────────
    location /api/ {
        # 'backend' es el nombre del servicio en el archivo docker-compose.yml
        proxy_pass http://backend:8080;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts para peticiones largas
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Cache de archivos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ROUTING DE ANGULAR (SPA)
    # Si la ruta no existe físicamente, devolvemos index.html para que Angular maneje el routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Desactivar tokens de versión de Nginx
    server_tokens off;

    upstream backend {
    server sistematriage-backend.up.railway.app:80;
}
}