name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write   # necesario para push a GHCR
  id-token: write   # opcional si usas OIDC for GHCR auth

env:
  GHCR_OWNER: ${{ github.repository_owner }}  # o "stefaniah016" si prefieres fijo

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [17]
        node-version: [22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - name: Cache Maven local repository
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build and run backend tests
        run: mvn -B test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install frontend deps and build (optional)
        working-directory: ./frontend
        run: |
          npm ci
          npx ng build --configuration production

  build-and-push-backend:
    name: Build and Push Backend Image
    runs-on: ubuntu-latest
    needs: build
    outputs:
      backend_tag: ${{ steps.pick-backend-tag.outputs.backend_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.GHCR_OWNER }}/triage-backend
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push backend image
        id: build-push-backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Get first backend tag
        id: pick-backend-tag
        run: |
          TAGS='${{ steps.meta-backend.outputs.tags }}'
          # tags come comma separated; pick first
          FIRST_TAG=$(echo "$TAGS" | cut -d',' -f1)
          echo "backend_tag=$FIRST_TAG" >> $GITHUB_OUTPUT

  deploy-backend:
    name: Deploy backend to Railway
    runs-on: ubuntu-latest
    needs: build-and-push-backend
    steps:
      - name: Show context (debug)
        run: |
          echo "Service ID: ${{ secrets.RAILWAY_SERVICE_ID }}"
          echo "Image tag from build job: ${{ needs.build-and-push-backend.outputs.backend_tag }}"

      - name: Verify Railway token (optional)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          docker run --rm -e RAILWAY_TOKEN="${RAILWAY_TOKEN}" ghcr.io/railwayapp/cli:latest whoami

      - name: Deploy backend image to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          SERVICE_ID="${{ secrets.RAILWAY_SERVICE_ID }}"   # set this secret in repo settings
          IMAGE="ghcr.io/${{ env.GHCR_OWNER }}/triage-backend:${{ needs.build-and-push-backend.outputs.backend_tag }}"
          echo "Deploying image: $IMAGE to service: $SERVICE_ID"
          docker run --rm -e RAILWAY_TOKEN="${RAILWAY_TOKEN}" ghcr.io/railwayapp/cli:latest deploy --service "${SERVICE_ID}" --image "${IMAGE}" --prod
