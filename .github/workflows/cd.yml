name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build backend Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/triage-backend:${{ github.sha }} .

      - name: Push backend Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/triage-backend:${{ github.sha }}

      - name: Build frontend Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/triage-frontend:${{ github.sha }} ./frontend

      - name: Push frontend Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/triage-frontend:${{ github.sha }}

      - name: Tag latest images
        run: |
          docker tag ghcr.io/${{ github.repository_owner }}/triage-backend:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/triage-backend:latest
          docker push ghcr.io/${{ github.repository_owner }}/triage-backend:latest
          docker tag ghcr.io/${{ github.repository_owner }}/triage-frontend:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/triage-frontend:latest
          docker push ghcr.io/${{ github.repository_owner }}/triage-frontend:latest
