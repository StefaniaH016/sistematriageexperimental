# .github/workflows/cd.yml

name: CD — Railway + Vercel + GHCR

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:

  # =========================================================
  # BUILD + PUSH IMAGES
  # =========================================================
  build-and-push:
    name: Build y Push Docker Images → GHCR
    runs-on: ubuntu-latest

    outputs:
      backend-image: ghcr.io/${{ github.repository }}/triage-backend:latest
      frontend-image: ghcr.io/${{ github.repository }}/triage-frontend:latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =====================================================
      # BACKEND METADATA
      # =====================================================
      - name: Metadata Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/triage-backend
          tags: |
            type=raw,value=latest
            type=sha

      # =====================================================
      # FRONTEND METADATA
      # =====================================================
      - name: Metadata Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/triage-frontend
          tags: |
            type=raw,value=latest
            type=sha

      # =====================================================
      # BUILD BACKEND
      # =====================================================
      - name: Build y Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./triage-backend
          dockerfile: ./triage-backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

          # MÁS ESTABLE EN RAILWAY
          platforms: linux/amd64

          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      # =====================================================
      # BUILD FRONTEND
      # =====================================================
      - name: Build y Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./triage-frontend
          dockerfile: ./triage-frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

          platforms: linux/amd64

          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # =========================================================
  # DEPLOY RAILWAY
  # =========================================================
  deploy-backend:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          echo "$HOME/.railway/bin" >> $GITHUB_PATH

      - name: Verificar Railway CLI
        run: railway --version

      - name: Deploy Backend Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service triage-backend \
            --detach

      - name: Verificar estado
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          sleep 20
          railway status --service triage-backend

  # =========================================================
  # DEPLOY VERCEL
  # =========================================================
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # NODE 20 = MÁS ESTABLE CON ANGULAR
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: triage-frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: ./triage-frontend
        run: npm ci

      - name: Build Angular
        working-directory: ./triage-frontend
        run: npx ng build --configuration production

      # =====================================================
      # DEBUG TEMPORAL
      # =====================================================
      - name: Ver estructura dist
        working-directory: ./triage-frontend
        run: |
          echo "===== DIST FILES ====="
          find dist -type f

      # =====================================================
      # VERIFICAR INDEX
      # =====================================================
      - name: Verificar output build
        working-directory: ./triage-frontend
        run: |
          if ! find dist -name index.html | grep -q index.html; then
            echo "❌ index.html no encontrado"
            exit 1
          fi

          echo "✅ Build verificado"

      # =====================================================
      # VERCEL CLI
      # =====================================================
      - name: Instalar Vercel CLI
        run: npm install --global vercel

      - name: Pull configuración Vercel
        working-directory: ./triage-frontend
        run: |
          vercel pull \
            --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel
        working-directory: ./triage-frontend
        run: |
          vercel build \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Vercel
        working-directory: ./triage-frontend
        run: |
          vercel deploy \
            --prebuilt \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }}

  # =========================================================
  # RESUMEN
  # =========================================================
  notify:
    name: Resumen del despliegue
    runs-on: ubuntu-latest

    needs:
      - deploy-backend
      - deploy-frontend

    if: always()

    steps:
      - name: Generar resumen
        run: |
          echo "## Resultado del Deploy 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Servicio | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY

          echo "| Railway Backend | ${{ needs.deploy-backend.result == 'success' && '✅ OK' || '❌ ERROR' }} |" >> $GITHUB_STEP_SUMMARY

          echo "| Vercel Frontend | ${{ needs.deploy-frontend.result == 'success' && '✅ OK' || '❌ ERROR' }} |" >> $GITHUB_STEP_SUMMARY