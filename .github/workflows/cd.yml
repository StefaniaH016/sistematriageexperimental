name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: Build y Push de imágenes a GHCR
  # ──────────────────────────────────────────────────────────
  build-and-push:
    name: Build y Push Docker Images → GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y Push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/triage-backend:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/triage-backend:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build y Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/triage-frontend:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/triage-frontend:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────
  # JOB 2: Deploy backend en Railway
  # ──────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: curl -fsSL https://railway.app/install.sh | sh

      - name: Deploy en Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service triage-backend --detach

      - name: Verificar deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          sleep 30
          railway status --service triage-backend

  # ──────────────────────────────────────────────────────────
  # JOB 3: Deploy frontend en Vercel (en paralelo con Railway)
  # ──────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: ./frontend
        run: npm ci

      - name: Build de producción
        working-directory: ./frontend
        run: npm run build -- --configuration production

      - name: Verificar output del build
        run: |
          if [ ! -f frontend/dist/frontend/browser/index.html ]; then
            echo "❌ index.html no encontrado"
            exit 1
          fi
          echo "✅ Build verificado"

      - name: Deploy a Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'

  # ──────────────────────────────────────────────────────────
  # JOB 4: Resumen
  # ──────────────────────────────────────────────────────────
  notify:
    name: Resumen del despliegue
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Resumen
        run: |
          echo "## Resultado del Despliegue" >> $GITHUB_STEP_SUMMARY
          echo "| Servicio | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend (Railway) | ${{ needs.deploy-backend.result == 'success' && '✅ Éxito' || '❌ Falló' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (Vercel) | ${{ needs.deploy-frontend.result == 'success' && '✅ Éxito' || '❌ Falló' }} |" >> $GITHUB_STEP_SUMMARY
