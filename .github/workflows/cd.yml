# .github/workflows/cd.yml

name: CD — Railway + Vercel + GHCR

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:

  # =========================================================
  # BUILD + PUSH DOCKER IMAGES
  # =========================================================
  build-and-push:
    name: Build y Push Docker Images → GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # =====================================================
      # SETUP JAVA + MAVEN
      # =====================================================
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # =====================================================
      # COMPILE BACKEND CON MAVEN
      # =====================================================
      - name: Compilar Backend con Maven
        run: mvn -B -DskipTests clean package

      # =====================================================
      # VERIFY JAR
      # =====================================================
      - name: Verificar JAR generado
        run: |
          if [ ! -f target/sistematriageexperimental-0.0.1-SNAPSHOT.jar ]; then
            echo "❌ JAR NO encontrado"
            ls -la target/
            exit 1
          fi
          echo "✅ JAR encontrado"
          ls -lah target/sistematriageexperimental-0.0.1-SNAPSHOT.jar

      # =====================================================
      # DEBUG REPO STRUCTURE
      # =====================================================
      - name: Debug estructura repo
        run: |
          echo "===== ROOT ====="
          pwd
          ls -la

          echo "===== DIRECTORIOS ====="
          find . -maxdepth 2 -type d

      # =====================================================
      # DOCKER SETUP
      # =====================================================
      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =====================================================
      # BACKEND METADATA
      # =====================================================
      - name: Metadata Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/sistematriageexperimental  
          tags: |
            type=raw,value=latest
            type=sha

      # =====================================================
      # FRONTEND METADATA
      # =====================================================
      - name: Metadata Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/triage-frontend
          tags: |
            type=raw,value=latest
            type=sha

      # =====================================================
      # VERIFY DOCKERFILES
      # =====================================================
      - name: Verificar Dockerfiles
        run: |
          echo "===== BACKEND ====="

          if [ ! -f src/Dockerfile ]; then
            echo "❌ src/Dockerfile NO existe"
            exit 1
          fi

          echo "✅ src/Dockerfile encontrado"

          echo "===== FRONTEND ====="

          if [ ! -f frontend/Dockerfile ]; then
            echo "❌ frontend/Dockerfile NO existe"
            exit 1
          fi

          echo "✅ frontend/Dockerfile encontrado"

      # =====================================================
      # BUILD BACKEND
      # =====================================================
      - name: Build y Push — triage-backend
        uses: docker/build-push-action@v5
        with:
         context: .
         file: ./src/Dockerfile
         push: true
         tags: ${{ steps.meta-backend.outputs.tags }}
         labels: ${{ steps.meta-backend.outputs.labels }}
         platforms: linux/amd64
         cache-from: type=gha,scope=backend
         cache-to: type=gha,scope=backend,mode=max


      - name: Build y Push — triage-frontend
        uses: docker/build-push-action@v5
        with:
         context: ./frontend
         file: ./frontend/Dockerfile
         push: true
         tags: ${{ steps.meta-frontend.outputs.tags }}
         labels: ${{ steps.meta-frontend.outputs.labels }}
         platforms: linux/amd64
         cache-from: type=gha,scope=frontend
         cache-to: type=gha,scope=frontend,mode=max


  # =========================================================
  # DEPLOY BACKEND → RAILWAY
  # =========================================================
  deploy-backend:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # =====================================================
      # INSTALL RAILWAY
      # =====================================================
      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Verificar Railway
        run: railway --version

      # =====================================================
      # DEPLOY
      # =====================================================
      - name: Deploy Backend a Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway deploy \
            --service sistematriageexperimental \
            --detach
      
      # =====================================================
      # CONFIGURAR VARIABLES DE ENTORNO
      # =====================================================
      - name: Configurar SPRING_PROFILES_ACTIVE en Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variable set SPRING_PROFILES_ACTIVE=prod \
            --service sistematriageexperimental || echo "Variable ya existe o no se pudo establecer"

  # =========================================================
  # DEPLOY FRONTEND → VERCEL
  # =========================================================
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # =====================================================
      # NODE 20 (ANGULAR MÁS ESTABLE)
      # =====================================================
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # =====================================================
      # INSTALL DEPENDENCIES
      # =====================================================
      - name: Instalar dependencias
        working-directory: ./frontend
        run: npm ci

      # =====================================================
      # ANGULAR BUILD
      # =====================================================
      - name: Build Angular
        working-directory: ./frontend
        run: npx ng build --configuration production

      # =====================================================
      # DEBUG DIST
      # =====================================================
      - name: Debug dist
        working-directory: ./frontend
        run: |
          echo "===== DIST ====="
          find dist -type f

      # =====================================================
      # VERIFY INDEX
      # =====================================================
      - name: Verificar build
        working-directory: ./frontend
        run: |
          if ! find dist -name index.html | grep -q index.html; then
            echo "❌ index.html NO encontrado"
            exit 1
          fi

          echo "✅ index.html encontrado"

      # =====================================================
      # INSTALL VERCEL
      # =====================================================
      - name: Instalar Vercel CLI
        run: npm install --global vercel

      # =====================================================
      # VERCEL PULL
      # =====================================================
      - name: Pull configuración Vercel
        working-directory: ./frontend
        run: |
          vercel pull \
            --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}

      # =====================================================
      # VERCEL BUILD
      # =====================================================
      - name: Build Vercel
        working-directory: ./frontend
        run: |
          vercel build \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }}

      # =====================================================
      # VERCEL DEPLOY
      # =====================================================
      - name: Deploy Vercel
        working-directory: ./frontend
        run: |
          vercel deploy \
            --prebuilt \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }}

  # =========================================================
  # SUMMARY
  # =========================================================
  notify:
    name: Resumen del despliegue
    runs-on: ubuntu-latest

    needs:
      - deploy-backend
      - deploy-frontend

    if: always()

    steps:
      - name: Generar resumen
        run: |
          echo "## Resultado del Deploy 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Servicio | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY

          echo "| Backend Railway | ${{ needs.deploy-backend.result == 'success' && '✅ OK' || '❌ ERROR' }} |" >> $GITHUB_STEP_SUMMARY

          echo "| Frontend Vercel | ${{ needs.deploy-frontend.result == 'success' && '✅ OK' || '❌ ERROR' }} |" >> $GITHUB_STEP_SUMMARY