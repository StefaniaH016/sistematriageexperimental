# ============================================================
# Configuración de Producción (Railway - PostgreSQL)
# ============================================================
# Railway expone automáticamente estas variables de entorno:
# DATABASE_URL (formato: postgresql://user:password@host:port/database)
# O también: PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD

# Opción 1: Usar DATABASE_URL (recomendado)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/solicitudesdb}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ============================================================
# JWT Configuration
# ============================================================
jwt.secret=${JWT_SECRET:}
jwt.expiration=86400000

# ============================================================
# Integración IA (Gemini API)
# ============================================================
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1/models/gemini-3.5-flash:generateContent}
gemini.api.model=gemini-3.5-flash

# ============================================================
# CORS Configuration
# ============================================================
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,https://localhost:*,http://127.0.0.1:*,https://127.0.0.1:*,https://*.vercel.app,https://*.railway.app}

# ============================================================
# Solicitudes Configuration
# ============================================================
solicitudes.limite-asignacion=${SOLICITUDES_LIMITE_ASIGNACION:5}

# ============================================================
# Logging
# ============================================================
logging.level.co.edu.uniquindio.poo=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
