# ============================================================
# Sistema de Triage y Gestión de Solicitudes Académicas
# Configuración de desarrollo
# ============================================================

# Nombre de la aplicación
spring.application.name=Sistema Triage Solicitudes Academicas

# Puerto del servidor
server.port=8080

# ============================================================
# Base de datos (Producción - Railway MySQL 8+)
# ============================================================
# Railway MySQL expone automáticamente: MYSQLHOST, MYSQLPORT,
# MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
# El driver MySQL Connector/J 8.0 soporta caching_sha2_password automáticamente
# allowPublicKeyRetrieval=true es necesario para Railway (conexión sin SSL)
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}

spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${DDL_AUTO}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

# ============================================================
# Swagger / OpenAPI
# Documentación accesible en: http://localhost:8080/swagger-ui.html
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================================================
# JWT Configuration
# ============================================================
# En producción, USAR SIEMPRE variable de entorno: JWT_SECRET
jwt.secret=${JWT_SECRET}
# Tiempo de expiración: 24 horas en milisegundos (86400000)
jwt.expiration=86400000

# ============================================================
# Integración IA (Gemini API)
# ============================================================
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1/models/gemini-3.5-flash:generateContent}
gemini.api.model=gemini-3.5-flash

# ============================================================
# CORS Configuration
# ============================================================
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,https://localhost:*,http://127.0.0.1:*,https://127.0.0.1:*,https://*.vercel.app,https://*.railway.app}

# ============================================================
# Solicitudes Configuration
# ============================================================
solicitudes.limite-asignacion=${SOLICITUDES_LIMITE_ASIGNACION:5}

# ============================================================
# Logging
# ============================================================
logging.level.co.edu.uniquindio.poo=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
