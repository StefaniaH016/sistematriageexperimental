# ============================================================
# Sistema de Triage y Gestión de Solicitudes Académicas
# Configuración de desarrollo
# ============================================================

# Nombre de la aplicación
spring.application.name=Sistema Triage Solicitudes Academicas

# Puerto del servidor
server.port=8080

# ============================================================
# Base de datos MariaDB (Producción/Hito 3)
# ============================================================
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3307/solicitudesdb}
spring.datasource.driverClassName=org.mariadb.jdbc.Driver
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# Swagger / OpenAPI
# Documentación accesible en: http://localhost:8080/swagger-ui.html
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================================================
# JWT Configuration
# ============================================================
# En producción, USAR SIEMPRE variable de entorno: JWT_SECRET
jwt.secret=${JWT_SECRET:}
# Tiempo de expiración: 24 horas en milisegundos (86400000)
jwt.expiration=86400000

# ============================================================
# Integración IA (Gemini API)
# ============================================================
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1/models/gemini-3.1-flash-lite:generateContent

# ============================================================
# Logging
# ============================================================
logging.level.co.edu.uniquindio.poo=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG
