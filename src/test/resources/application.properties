# DataSource configuration for H2 in-memory database during tests
spring.datasource.url=jdbc:h2:mem:solicitudesdb_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Secret for testing (uses environment variable or test default)
jwt.secret=${JWT_SECRET:MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNA==}
jwt.expiration=3600000

# Gemini API Mock / Testing (uses environment variables or test defaults)
gemini.api.key=${GEMINI_API_KEY:mock-key}
gemini.api.url=https://generativelanguage.googleapis.com/v1/models/gemini-3.5-flash:generateContent
gemini.api.model=gemini-3.5-flash
solicitudes.limite-asignacion=5
