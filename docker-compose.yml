name: triage-sistema

services:
  # ────────────────────────────────────────────────────────
  # BASE DE DATOS: PostgreSQL
  # ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: triage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-solicitudesdb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - triage-network

  # ────────────────────────────────────────────────────────
  # BACKEND: Spring Boot (Java 17)
  # ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: triage-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-solicitudesdb}
      PGUSER: ${DB_USER:-postgres}
      PGPASSWORD: ${DB_PASSWORD:-postgres_password}
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - triage-network

  # ────────────────────────────────────────────────────────
  # FRONTEND: Angular + Nginx
  # ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: triage-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - triage-network

# ────────────────────────────────────────────────────────────
# VOLÚMENES NOMBRADOS
# ────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: triage_postgres_data

# ────────────────────────────────────────────────────────────
# REDES
# ────────────────────────────────────────────────────────────
networks:
  triage-network:
    name: triage_network
    driver: bridge