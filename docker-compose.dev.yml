services:
  # En desarrollo, exponemos el puerto de MariaDB para conexiones directas desde el host
  mariadb:
    ports:
      - "${DB_PORT:-3307}:3306"

  # En desarrollo, exponemos el puerto del backend para Swagger y Postman
  backend:
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev

  # Interfaz gráfica de administración para la base de datos (Adminer)
  adminer:
    image: adminer:latest
    container_name: triage-adminer
    restart: unless-stopped
    ports:
      - "8082:8080"
    depends_on:
      - mariadb
    networks:
      - triage-network
