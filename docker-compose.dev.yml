services:
  # En desarrollo, exponemos el puerto de PostgreSQL para conexiones directas desde el host
  postgres:
    ports:
      - "${DB_PORT:5432}:5432"

  # En desarrollo, exponemos el puerto del backend para Swagger y Postman
  backend:
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev

  # Interfaz gráfica de administración para la base de datos (pgAdmin)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: triage-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - triage-network
