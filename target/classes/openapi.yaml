      summary: "RF-05 — Asignar responsable activo a una solicitud"
      description: |
        Asigna un responsable activo a una solicitud.
        - El responsable **debe estar activo** (`activo = true`).
        - La asignación queda registrada en el historial (RF-06).
        - Cambia el estado a **EN_ATENCION**.
      operationId: asignarResponsable
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignacionRequestDTO'
            example:
              responsableId: 3
              observaciones: "Asignado al Dr. Martínez por especialidad en homologaciones"
      responses:
        '200':
          description: Responsable asignado exitosamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseDTO'
                  - type: object
                    properties:
                      datos:
                        $ref: '#/components/schemas/SolicitudResponseDTO'
