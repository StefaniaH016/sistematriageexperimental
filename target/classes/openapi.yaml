  # ============================================================
  # PATHS — INTELIGENCIA ARTIFICIAL (RF-09, RF-10)
  # ============================================================

  /api/ia/solicitudes/{id}/sugerencia:
    post:
      tags: [Inteligencia Artificial]
      summary: "RF-09, RF-10 — Obtener sugerencia de IA para una solicitud"
      description: |
        Consulta el LLM para obtener asistencia inteligente sobre una solicitud académica (RF-09, RF-10).
        El backend envía al modelo la descripción de la solicitud, su historial y contexto académico
        para generar:
        - Un **borrador de respuesta** que el responsable puede revisar, editar y enviar al solicitante (RF-09).
        - Una **clasificación y prioridad sugeridas** basadas en el análisis semántico del texto (RF-10).

        **Nota de seguridad:** La sugerencia es de apoyo a la decisión humana; nunca altera el estado
        de la solicitud ni ejecuta acciones por sí misma. El actor que llama este endpoint es
        extraído del contexto de seguridad del servidor.
      operationId: obtenerSugerenciaIA
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: ID de la solicitud académica a analizar
          example: 1
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SugerenciaIARequestDTO'
            example:
              contextoAdicional: "El estudiante cursó la asignatura en institución acreditada por el CNA."
      responses:
        '200':
          description: Sugerencia de IA generada exitosamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseDTO'
                  - type: object
                    properties:
                      datos:
                        $ref: '#/components/schemas/SugerenciaIAResponseDTO'
              example:
                exitoso: true
                mensaje: "Sugerencia de IA generada exitosamente"
                datos:
                  solicitudId: 1
                  sugerenciaRespuesta: "Estimado estudiante, para procesar su solicitud de homologación debe adjuntar el certificado de notas oficial y el contenido programático detallado de la asignatura cursada."
                  tipoSolicitudSugerido: HOMOLOGACION
                  prioridadSugerida: ALTA
                  justificacionIA: "La descripción menciona homologación con fecha de cierre próxima, lo que justifica prioridad ALTA."
                  modeloUtilizado: "gpt-4o-mini"
                  generadoEn: "2026-02-23T10:30:00"
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          description: Error al consultar el servicio de IA (LLM no disponible)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
              example:
                exitoso: false
                mensaje: "El servicio de IA no está disponible en este momento. Intente más tarde."
                datos: null

  /api/ia/solicitudes/{id}/clasificacion-sugerida:
    get:
      tags: [Inteligencia Artificial]
      summary: "RF-10 — Obtener clasificación automática sugerida por IA"
      description: |
        Solicita al LLM que analice la descripción de la solicitud y devuelva únicamente
        la **clasificación y prioridad sugeridas**, sin borrador de respuesta.

        Útil para asistir al coordinador durante la etapa de clasificación masiva de solicitudes (RF-02, RF-10).
        El resultado es de carácter orientativo; la clasificación final siempre es confirmada por un humano.
      operationId: obtenerClasificacionSugerida
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: ID de la solicitud académica a analizar
          example: 1
      responses:
        '200':
          description: Clasificación sugerida por IA obtenida exitosamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseDTO'
                  - type: object
                    properties:
                      datos:
                        $ref: '#/components/schemas/SugerenciaIAResponseDTO'
              example:
                exitoso: true
                mensaje: "Clasificación sugerida por IA obtenida exitosamente"
                datos:
                  solicitudId: 1
                  tipoSolicitudSugerido: HOMOLOGACION
                  prioridadSugerida: ALTA
                  justificacionIA: "Palabras clave detectadas: homologación, institución externa, cierre de período."
                  modeloUtilizado: "gpt-4o-mini"
                  generadoEn: "2026-02-23T10:35:00"
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          description: Error al consultar el servicio de IA (LLM no disponible)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
              example:
                exitoso: false
                mensaje: "El servicio de IA no está disponible en este momento. Intente más tarde."
                datos: null