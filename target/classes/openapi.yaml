        '409':
          $ref: '#/components/responses/Conflict'

  /api/solicitudes/{id}/cerrar:
    put:
      tags: [Solicitudes]
      summary: "RF-08 — Cerrar formalmente una solicitud atendida"
      description: |
        Cierra una solicitud con observación obligatoria.

        **Precondiciones (RF-08):**
        - La solicitud debe estar en estado `ATENDIDA`.
        - La `observacionCierre` es **obligatoria** y no puede estar vacía.
        - Una vez cerrada, la solicitud es **inmutable**: no puede ser modificada.
      operationId: cerrarSolicitud
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CierreRequestDTO'
            example:
              observacionCierre: "Homologación aprobada. Resolución firmada por el director de programa."
      responses:
        '200':
          description: Solicitud cerrada exitosamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseDTO'
                  - type: object
                    properties:
                      datos:
                        $ref: '#/components/schemas/SolicitudResponseDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

